# Application
spring.application.name=stream-chat
server.port=8080

# JWT Configuration
jwt.secret=dev-secret-key-please-change-in-production-must-be-at-least-64-characters-long
jwt.expiration=86400000

# Database (H2 for development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis (disabled for development)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Logging
logging.level.root=INFO
logging.level.com.streamchat=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS (comma-separated). Use explicit origins in prod.
app.cors.allowed-origins=*
