# Database (H2 for development)
spring.datasource.url=jdbc:h2:mem:chatdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Redis for dev profile (use in-memory instead)
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT
jwt.secret=dev-secret-key-please-change-in-production-must-be-at-least-64-characters-long
jwt.expiration=86400000

# Flyway (disabled for H2 with create-drop)
spring.flyway.enabled=false

# CORS (comma-separated)
app.cors.allowed-origins=*
